<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | Booking</title>
    <link rel="stylesheet" href="./auth.css" />
  </head>
  <body>
    <div class="page-wrap">
      <div class="auth-panel">
        <h1>Create your account</h1>
        <p>Register with Google, Facebook, or your email and verify with a code sent to you.</p>

        <div class="social-row">
          <button class="social-button" onclick="socialSign('Google')">🌐 Continue with Google</button>
          <button class="social-button" onclick="socialSign('Facebook')">📘 Continue with Facebook</button>
        </div>

        <div class="divider">Or register with email</div>

        <form id="registerForm" class="register-form" onsubmit="event.preventDefault(); sendVerificationCode();">
          <div class="form-field">
            <label for="registerName">Full name</label>
            <input id="registerName" type="text" placeholder="Jane Doe" required />
          </div>
          <div class="form-field">
            <label for="registerEmail">Email address</label>
            <input id="registerEmail" type="email" placeholder="jane@example.com" required />
          </div>
          <div class="form-field">
            <label for="registerPassword">Create password</label>
            <input id="registerPassword" type="password" placeholder="••••••••" required />
          </div>
          <div class="form-field">
            <button type="submit">Send verification code</button>
          </div>
        </form>

        <div id="verificationPanel" class="verify-panel">
          <div class="alert" id="verificationMessage">A code has been sent to your email address.</div>
          <div class="verify-code">
            <label for="registerCode">Enter verification code</label>
            <input id="registerCode" type="text" inputmode="numeric" maxlength="6" placeholder="123456" />
          </div>
          <div class="form-field">
            <button type="button" onclick="verifyRegisterCode()">Verify and finish registration</button>
          </div>
        </div>

        <div class="link-row">
          Already have an account? <a href="./signin.html">Sign in</a>
        </div>
      </div>
    </div>

    <script>
      function socialSign(provider) {
        alert(provider + ' sign-in is ready. In a real app, this would redirect to the provider auth flow.');
      }

      function sendVerificationCode() {
        document.getElementById('verificationPanel').classList.add('active');
        document.getElementById('verificationMessage').textContent = 'A verification code has been sent to ' + document.getElementById('registerEmail').value + '.';
      }

      function verifyRegisterCode() {
        const code = document.getElementById('registerCode').value.trim();
        if (!code || code.length < 4) {
          alert('Please enter a valid verification code.');
          return;
        }
        alert('Verification complete! Your account is now registered.');
        window.location.href = './signin.html';
      }
    </script>
  </body>
</html>
