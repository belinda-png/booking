<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in | Booking</title>
    <link rel="stylesheet" href="./auth.css" />
  </head>
  <body>
    <div class="page-wrap">
      <div class="auth-panel">
        <h1>Sign in to your account</h1>
        <p>Use Google, Facebook, or your email to sign in. Then verify with the code we send to your email.</p>

        <div class="social-row">
          <button class="social-button" onclick="socialSign('Google')">🌐 Sign in with Google</button>
          <button class="social-button" onclick="socialSign('Facebook')">📘 Sign in with Facebook</button>
        </div>

        <div class="divider">Or sign in with email</div>

        <form id="signinForm" class="register-form" onsubmit="event.preventDefault(); sendLoginCode();">
          <div class="form-field">
            <label for="signinEmail">Email address</label>
            <input id="signinEmail" type="email" placeholder="jane@example.com" required />
          </div>
          <div class="form-field">
            <label for="signinPassword">Password</label>
            <input id="signinPassword" type="password" placeholder="••••••••" required />
          </div>
          <div class="form-field">
            <button type="submit">Send sign-in code</button>
          </div>
        </form>

        <div id="signinVerificationPanel" class="verify-panel">
          <div class="alert" id="signinVerificationMessage">A code has been sent to your email address.</div>
          <div class="verify-code">
            <label for="signinCode">Enter verification code</label>
            <input id="signinCode" type="text" inputmode="numeric" maxlength="6" placeholder="123456" />
          </div>
          <div class="form-field">
            <button type="button" onclick="verifySigninCode()">Verify and sign in</button>
          </div>
        </div>

        <div class="link-row">
          New here? <a href="./register.html">Create an account</a>
        </div>
      </div>
    </div>

    <script>
      function socialSign(provider) {
        alert(provider + ' sign-in is ready. In a real app, this would redirect to the provider auth flow.');
      }

      function sendLoginCode() {
        document.getElementById('signinVerificationPanel').classList.add('active');
        document.getElementById('signinVerificationMessage').textContent = 'A sign-in code has been sent to ' + document.getElementById('signinEmail').value + '.';
      }

      function verifySigninCode() {
        const code = document.getElementById('signinCode').value.trim();
        if (!code || code.length < 4) {
          alert('Please enter a valid verification code.');
          return;
        }
        alert('You are now signed in!');
        window.location.href = './index.html';
      }
    </script>
  </body>
</html>
